[build]
  functions = "netlify/functions"

[functions]
  node_bundler = "esbuild"

[functions."admin-ai"]
  timeout = 60

[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"

[[headers]]
  for = "/.netlify/functions/*"
  [headers.values]
    Access-Control-Allow-Origin = "*"
